<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#171717" />
    <title>Bibble Settings</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="mark" aria-hidden="true">†</div>
        <div>
          <p class="eyebrow">Bibble</p>
          <h1>Settings</h1>
          <p class="lede">Choose the size and weight used for scripture, selection labels, and headers.</p>
        </div>
      </header>

      <form id="settings-form" class="card">
        <fieldset class="setting-group">
          <legend>Text size</legend>

          <label class="choice">
            <input type="radio" name="font-size" value="14" checked />
            <span>
              <strong>14</strong>
              <small>Compact</small>
            </span>
          </label>

          <label class="choice">
            <input type="radio" name="font-size" value="18" />
            <span>
              <strong>18</strong>
              <small>Medium</small>
            </span>
          </label>

          <label class="choice">
            <input type="radio" name="font-size" value="24" />
            <span>
              <strong>24</strong>
              <small>Large</small>
            </span>
          </label>
        </fieldset>

        <fieldset class="setting-group">
          <legend>Boldness</legend>

          <label class="choice">
            <input type="radio" name="font-bold" value="regular" checked />
            <span><strong>Not bold</strong></span>
          </label>

          <label class="choice">
            <input type="radio" name="font-bold" value="bold" />
            <span><strong>Yes, bold</strong></span>
          </label>
        </fieldset>

        <section class="preview-section" aria-labelledby="preview-title">
          <h2 id="preview-title">Preview</h2>
          <div id="watch-preview" class="watch-preview" data-font-size="14" data-bold="false">
            <div class="preview-header">
              <span>John 3</span>
              <span>10:09</span>
            </div>
            <p>16. For God so loved the world, that he gave his only begotten Son.</p>
          </div>
        </section>

        <button class="primary" type="submit">Save &amp; close</button>
        <p id="status" class="status" role="status">Ready to save.</p>
      </form>
    </main>

    <script src="./settings.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
